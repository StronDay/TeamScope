version: '3.8'

networks:
  team-scope-network:
    driver: bridge

services:

  api:
    build:
      context: ./docker/Api
      dockerfile: Dockerfile
    volumes:
      - ./services/Api:/workspaces/Api:cached
    ports:
      - "5015:5015"
    networks:
      - team-scope-network

  staff_service:
    build:
      context: ./docker/Staff
      dockerfile: Dockerfile
    volumes:
      - ./services/Staff:/workspaces/Staff:cached
    ports:
      - "5022:5022"
    networks:
      - team-scope-network

  auth_service:
    build:
      context: ./docker/Auth
      dockerfile: Dockerfile
    volumes:
      - ./services/Auth:/workspaces/Auth:cached
    ports:
      - "5066:5066"
    networks:
      - team-scope-network

  staff_db:
    image: postgres:14.3
    restart: unless-stopped
    volumes:
      - ./staff-postgres-data:/var/lib/postgresql/data
      - ./docker/Staff/staff_db_dump.sql:/docker-entrypoint-initdb.d/staff_db_dump.sql
    environment:
      POSTGRES_PASSWORD: ${STAFF_POSTGRES_PASSWORD}
      POSTGRES_USER: ${STAFF_POSTGRES_USER}
      POSTGRES_DB: ${STAFF_POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - team-scope-network

  account_db:
    image: postgres:14.3
    restart: unless-stopped
    volumes:
      - ./account-postgres-data:/var/lib/postgresql/data
      - ./docker/Auth/account_db_dump.sql:/docker-entrypoint-initdb.d/account_db_dump.sql
    environment:
      POSTGRES_PASSWORD: ${ACCOUNT_POSTGRES_PASSWORD}
      POSTGRES_USER: ${ACCOUNT_POSTGRES_USER}
      POSTGRES_DB: ${ACCOUNT_POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - team-scope-network

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin-data:/var/lib/pgadmin
    depends_on:
      - staff_db
      - account_db
    networks:
      - team-scope-network

  structurizr:
    image: structurizr/lite
    ports:
      - "8080:8080"
    volumes:
      - ./doc/structurizr:/usr/local/structurizr
    networks:
      - team-scope-network
